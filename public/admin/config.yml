backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: public/images/uploads
public_folder: /images/uploads

collections:

  - name: features
    label: Features / Cards
    folder: src/content/features
    create: true
    format: frontmatter
    fields:
      - { label: "Feature Title", name: "title", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Image Alt Text", name: "alt", widget: "string" }
      - { label: "Category / Type (e.g. Main course 🥘)", name: "type", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }

  - name: testimonials
    label: Testimonials
    folder: src/content/testimonials
    create: true
    format: frontmatter
    fields:
      - { label: "Customer Name", name: "title", widget: "string" }
      - { label: "Avatar Image", name: "avatar", widget: "image" }
      - { label: "Rating (1 to 5)", name: "rating", widget: "number", value_type: "float", min: 1, max: 5, step: 0.5 }
      - { label: "Review Content", name: "content", widget: "text" }

  - name: blog
    label: Blog / News
    folder: src/content/blog
    create: true
    format: frontmatter
    fields:
      - { label: "Post Title", name: "title", widget: "string" }
      - { label: "Featured Image", name: "img", widget: "image" }
      - { label: "Image Alt Text", name: "alt", widget: "string" }
      - { label: "Summary / Description", name: "description", widget: "text" }
      - { label: "Read More Link", name: "blogLink", widget: "string", default: "#" }

  - name: sections
    label: Sections
    files:
      - name: hero
        label: Hero Section
        file: src/content/sections/hero.md
        format: frontmatter
        fields:
          - { label: "Main Title", name: "title", widget: "string" }
          - { label: "Subheading / Description", name: "description", widget: "text" }
          - label: Hero Slides
            name: slides
            widget: list
            fields:
              - { label: "Slide Identifier (e.g. Slide 1)", name: "title", widget: "string" }
              - { label: "Display Order ID", name: "id", widget: "number", value_type: "int" }
              - { label: "Image", name: "img", widget: "image" }
              - { label: "Image Alt Text", name: "imgAlt", widget: "string" }
              - { label: "User Comment", name: "userComment", widget: "text" }
              - { label: "User Avatar", name: "userAvatar", widget: "image" }

      - name: about
        label: About Section
        file: src/content/sections/about.md
        format: frontmatter
        fields:
          - { label: "Section Badge", name: "badge", widget: "string", default: "About Us" }
          - { label: "Section Title", name: "title", widget: "string" }
          - { label: "Section Description", name: "description", widget: "text" }
          - { label: "Read More Link", name: "readMoreLink", widget: "string", default: "#" }
          - { label: "About Image", name: "image", widget: "image" }
          - label: Achievements Stats
            name: stats
            widget: list
            fields:
              - { label: "Stat Value (e.g. 20+)", name: "value", widget: "string" }
              - { label: "Line 1 Description", name: "line1", widget: "string" }
              - { label: "Line 2 Description", name: "line2", widget: "string" }
              - label: Icon
                name: icon
                widget: select
                options: ["SparklesIcon", "ChefHat", "Users", "Trophy"]

      - name: contact
        label: Contact Section
        file: src/content/sections/contact.md
        format: frontmatter
        fields:
          - label: Contact Cards
            name: contact
            widget: list
            fields:
              - { label: "Card Title", name: "title", widget: "string" }
              - { label: "Description (Use \\n for line breaks)", name: "description", widget: "text" }
              - label: Icon
                name: icon
                widget: select
                options: ["Clock8Icon", "MapPinIcon", "Mail", "PhoneIcon"]

      - name: promotions
        label: Promotions Section
        file: src/content/sections/promotions.md
        format: frontmatter
        fields:
          - label: Promotions Banners
            name: promotions
            widget: list
            fields:
              - { label: "Promo Image", name: "src", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }
              - { label: "Grid Size Class", name: "className", widget: "select", options: ["col-span-2 row-span-2", "col-span-2 max-h-60"] }
              - label: Promo Title Text
                name: offerText
                widget: object
                fields:
                  - { label: "Text", name: "text", widget: "string" }
                  - { label: "Class Styling", name: "className", widget: "string" }
              - label: Promo Action Button
                name: offerButton
                widget: object
                fields:
                  - { label: "Button Text", name: "text", widget: "string" }
                  - { label: "Button Link", name: "link", widget: "string" }
                  - { label: "Class Styling", name: "className", widget: "string" }
