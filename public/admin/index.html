<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Bistro Content Manager</title>
    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!-- Decap CMS React App -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    
    <script>
      // Load Tailwind styles compiled by Vite into the CMS preview iframe
      CMS.registerPreviewStyle('/src/styles/global.css');

      // Helper to render lucide icon placeholders
      const IconPlaceholder = (iconName) => {
        return React.createElement('div', { 
          className: 'text-xs font-semibold text-primary px-3 py-1.5 bg-primary/10 rounded-full border border-primary/20 w-fit' 
        }, `🔧 ${iconName}`);
      };

      // 1. Hero Preview Component
      const HeroPreview = ({ entry }) => {
        const title = entry.getIn(['data', 'title']) || '';
        const description = entry.getIn(['data', 'description']) || '';
        const slides = entry.getIn(['data', 'slides'])?.toJS() || [];

        return React.createElement('section', { className: 'relative overflow-hidden py-12 md:py-20 bg-background text-foreground border-b' },
          React.createElement('div', { className: 'mx-auto max-w-7xl px-4 text-center' },
            React.createElement('h1', { className: 'text-4xl md:text-5xl font-extrabold tracking-tight text-balance' }, title),
            React.createElement('p', { className: 'mt-6 text-lg text-muted-foreground max-w-3xl mx-auto' }, description),
            React.createElement('h3', { className: 'text-xl font-bold mt-12 mb-6 text-left border-b pb-2' }, 'Combined Slides List:'),
            React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 text-left' },
              slides.map((slide, index) => 
                React.createElement('div', { key: index, className: 'border rounded-2xl p-6 bg-card text-card-foreground shadow-sm flex flex-col justify-between' },
                  React.createElement('div', null,
                    React.createElement('img', { src: slide.img, alt: slide.imgAlt, className: 'w-full h-40 object-cover rounded-xl mb-4' }),
                    React.createElement('p', { className: 'italic text-sm text-muted-foreground' }, `"${slide.userComment}"`)
                  ),
                  React.createElement('div', { className: 'mt-4 flex items-center border-t pt-4' },
                    React.createElement('img', { src: slide.userAvatar, className: 'w-10 h-10 rounded-full mr-3 border' }),
                    React.createElement('div', null,
                      React.createElement('span', { className: 'font-semibold text-sm block' }, slide.title),
                      React.createElement('span', { className: 'text-xs text-muted-foreground' }, `ID: ${slide.id}`)
                    )
                  )
                )
              )
            )
          )
        );
      };

      // 2. About Preview Component
      const AboutPreview = ({ entry }) => {
        const badge = entry.getIn(['data', 'badge']) || 'About Us';
        const title = entry.getIn(['data', 'title']) || '';
        const description = entry.getIn(['data', 'description']) || '';
        const image = entry.getIn(['data', 'image']) || '/images/about-us.webp';
        const stats = entry.getIn(['data', 'stats'])?.toJS() || [];

        return React.createElement('section', { className: 'py-12 md:py-20 bg-background text-foreground border-b' },
          React.createElement('div', { className: 'mx-auto max-w-7xl px-4' },
            React.createElement('div', { className: 'max-w-3xl mx-auto text-center mb-12 flex flex-col items-center justify-center space-y-4' },
              React.createElement('span', { className: 'inline-flex items-center rounded-full border px-2.5 py-0.5 text-xs font-semibold bg-muted text-foreground' }, badge),
              React.createElement('h2', { className: 'text-3xl md:text-4xl font-bold tracking-tight' }, title),
              React.createElement('p', { className: 'mt-4 text-base text-muted-foreground' }, description)
            ),
            React.createElement('div', { className: 'relative' },
              React.createElement('img', { src: image, className: 'w-full h-80 object-cover rounded-2xl shadow-md' }),
              React.createElement('div', { className: 'mt-8 bg-card border rounded-2xl p-6 grid grid-cols-2 md:grid-cols-4 gap-6 text-center' },
                stats.map((stat, idx) => 
                  React.createElement('div', { key: idx, className: 'flex flex-col items-center justify-center gap-2' },
                    IconPlaceholder(stat.icon),
                    React.createElement('span', { className: 'text-2xl font-bold mt-1' }, stat.value),
                    React.createElement('span', { className: 'text-xs text-muted-foreground' }, `${stat.line1} ${stat.line2}`)
                  )
                )
              )
            )
          )
        );
      };

      // 3. Contact Preview Component
      const ContactPreview = ({ entry }) => {
        const contactList = entry.getIn(['data', 'contact'])?.toJS() || [];

        return React.createElement('section', { className: 'py-12 md:py-20 bg-background text-foreground border-b' },
          React.createElement('div', { className: 'mx-auto max-w-7xl px-4' },
            React.createElement('h2', { className: 'text-3xl font-bold text-center mb-12' }, 'Contact Information'),
            React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6' },
              contactList.map((card, idx) => 
                React.createElement('div', { key: idx, className: 'border rounded-2xl p-6 bg-card text-card-foreground shadow-sm flex flex-col items-center text-center gap-2' },
                  IconPlaceholder(card.icon),
                  React.createElement('h3', { className: 'text-lg font-semibold mt-2' }, card.title),
                  React.createElement('p', { className: 'text-sm text-muted-foreground whitespace-pre-line' }, card.description)
                )
              )
            )
          )
        );
      };

      // 4. Promotions Preview Component
      const PromotionsPreview = ({ entry }) => {
        const promotionsList = entry.getIn(['data', 'promotions'])?.toJS() || [];

        return React.createElement('section', { className: 'py-12 md:py-20 bg-background text-foreground border-b' },
          React.createElement('div', { className: 'mx-auto max-w-7xl px-4' },
            React.createElement('h2', { className: 'text-3xl font-bold text-center mb-12' }, 'Promotions & Offers'),
            React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-6' },
              promotionsList.map((promo, idx) => 
                React.createElement('div', { key: idx, className: 'relative overflow-hidden rounded-2xl border bg-card text-card-foreground shadow-sm flex flex-col justify-between' },
                  React.createElement('div', null,
                    React.createElement('img', { src: promo.src, alt: promo.alt, className: 'w-full h-48 object-cover rounded-t-2xl' }),
                    React.createElement('div', { className: 'p-6' },
                      React.createElement('span', { className: 'text-[10px] uppercase font-bold text-muted-foreground block' }, `Class: ${promo.className}`),
                      promo.offerText && React.createElement('h3', { className: 'text-lg font-bold mt-2' }, promo.offerText.text)
                    )
                  ),
                  promo.offerButton && React.createElement('div', { className: 'px-6 pb-6 pt-0' },
                    React.createElement('a', { 
                      className: 'inline-flex h-9 w-full items-center justify-center rounded-xl bg-primary px-4 py-2 text-sm font-medium text-primary-foreground shadow hover:bg-primary/90', 
                      href: promo.offerButton.link,
                      onClick: (e) => e.preventDefault()
                    }, promo.offerButton.text)
                  )
                )
              )
            )
          )
        );
      };

      // Switcher based on the file name being edited in the files collection
      const SectionsPreview = (props) => {
        const slug = props.entry.get('slug');
        if (slug === 'hero') return HeroPreview(props);
        if (slug === 'about') return AboutPreview(props);
        if (slug === 'contact') return ContactPreview(props);
        if (slug === 'promotions') return PromotionsPreview(props);
        return React.createElement('div', null, 'Loading Section Preview...');
      };

      // Register the unified sections preview
      CMS.registerPreviewTemplate("sections", SectionsPreview);
    </script>
  </body>
</html>
